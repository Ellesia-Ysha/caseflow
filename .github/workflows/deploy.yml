name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Not `npm ci`: this lockfile is generated on Windows during local dev,
      # and npm has a known bug (npm/cli#4828) where optional platform
      # binaries (e.g. @rollup/rollup-linux-x64-gnu) recorded in a
      # cross-platform-written lockfile don't reliably get installed by
      # `npm ci` on a different OS. `npm install` re-resolves optional deps
      # against the actual runner platform instead of trusting the snapshot.
      - run: npm install
      - run: npm run check
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
